<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <title>Login</title>
</head>
<body>

    <div class="container">  <!-- Wrapper for form -->
        <h2 class="word">Choose the language</h2>
        
        <form action="{{ url_for('learn_the_language') }}" method="post">
            <div>{{ msg }}</div>

            <input class="textbox" type="text" name="language_to_learn" placeholder="Enter the language" required>
            <input class="textbox" type="text" name="the_level" placeholder="Enter the level" required>
            
            <button class="btn" type="submit">Submit</button>
        </form>

    </div>

</body>
</html>
