<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <title>Trial</title>
</head>
<body>
    <div class="container">

    {% if response %}
    <!-- Show the first line -->
    <div class="card">
        <span class="speaker">{{ response[0]['name'] }}</span>
        <p class="primary-text">{{ response[0]['primary_lang'] }}</p>
    </div>

    <!-- Input area -->
    <div style="display: flex; gap: 8px; margin-top: 15px;">
        <input type="text" id="myInput" placeholder="Type your translation...">
        <button onclick="showValue()">Submit</button>
    </div>

    <!-- Answer revealed here -->
    <p id="output"></p>

    {% endif %}

</div>

   <script>
    function showValue() {
        const value = document.getElementById("myInput").value;
        document.getElementById("output").textContent = "{{ response[0]['secondary_lang'] }}";
    }
</script>

</body>
</html>
